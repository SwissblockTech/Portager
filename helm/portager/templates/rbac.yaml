---
# ClusterRole for managing ImageSync resources, secrets, and events.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "portager.fullname" . }}-manager-role
  labels:
    {{- include "portager.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - portager.portager.io
    resources:
      - imagesyncs
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - portager.portager.io
    resources:
      - imagesyncs/finalizers
    verbs:
      - update
  - apiGroups:
      - portager.portager.io
    resources:
      - imagesyncs/status
    verbs:
      - get
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "portager.fullname" . }}-manager-rolebinding
  labels:
    {{- include "portager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "portager.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "portager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
# Leader election Role (namespaced).
{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "portager.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portager.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "portager.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "portager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "portager.fullname" . }}-leader-election-role
subjects:
  - kind: ServiceAccount
    name: {{ include "portager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
---
# Metrics auth ClusterRole (for authn/authz on the metrics endpoint).
{{- if .Values.metrics.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "portager.fullname" . }}-metrics-auth-role
  labels:
    {{- include "portager.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "portager.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "portager.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "portager.fullname" . }}-metrics-auth-role
subjects:
  - kind: ServiceAccount
    name: {{ include "portager.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "portager.fullname" . }}-metrics-reader
  labels:
    {{- include "portager.labels" . | nindent 4 }}
rules:
  - nonResourceURLs:
      - /metrics
    verbs:
      - get
{{- end }}
